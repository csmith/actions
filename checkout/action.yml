name: 'Checkout'
description: 'Checkout a repository'
runs:
  using: 'docker'
  image: 'docker://git.yak-wall.ts.net/public/actions/checkout:dev'
  args:
    - -path=${{ inputs.path }}
    - -debug=${{ inputs.debug }}
    - -fetch-tags=${{ inputs.fetch-tags }}
inputs:
  path:
    description: 'Path to checkout to (relative to workspace)'
    required: false
    default: 'src'
  debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'
  fetch-tags:
    description: 'Fetch tags from the remote'
    required: false
    default: 'true'
outputs:
  path:
    description: 'The path the repository was checked out to'
